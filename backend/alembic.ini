# Alembic configuration.
#
# The database URL is intentionally NOT hard-coded here. It is loaded from the
# application Settings (and therefore the environment) inside migrations/env.py,
# so there is exactly one source of truth for the connection string and no
# secret ever lives in a committed file.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use a timestamped, readable slug for new migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
